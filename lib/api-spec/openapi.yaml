openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: identity
    description: Signed-in identity and role resolution
  - name: student
    description: Student profile operations
  - name: leaderboard
    description: Leaderboard operations
  - name: admin
    description: Admin-only staff management
  - name: teacher
    description: Teacher dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /identity/me:
    get:
      operationId: getIdentityMe
      tags: [identity]
      summary: Resolve the signed-in user's platform identity and role
      description: Returns the current user's role (admin/teacher/student), onboarding status, and class/teacher info. Creates a platform row on first visit.
      responses:
        "200":
          description: Identity resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
        "401":
          description: Not signed in
  /student/me:
    get:
      operationId: getStudentProfile
      tags: [student]
      summary: Get the signed-in student's profile
      description: Returns the current student's profile, creating one on first visit (JIT-provisioned from the Clerk account).
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "401":
          description: Not signed in
    patch:
      operationId: updateStudentName
      tags: [student]
      summary: Capture the user's full name on first sign-in
      description: Sets the in-platform name and marks the onboarding name step as complete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameCaptureBody"
      responses:
        "200":
          description: Updated student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "401":
          description: Not signed in
  /student/avatar:
    patch:
      operationId: updateStudentAvatar
      tags: [student]
      summary: Update the signed-in student's avatar customization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarConfig"
      responses:
        "200":
          description: Updated student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "401":
          description: Not signed in
  /student/challenges:
    get:
      operationId: getStudentChallenges
      tags: [student]
      summary: List active daily challenges for the signed-in student
      responses:
        "200":
          description: Active challenges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentChallengeList"
        "401":
          description: Not signed in
  /student/challenges/{id}:
    get:
      operationId: getStudentChallengeById
      tags: [student]
      summary: Get a single active challenge for the signed-in student
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Challenge details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentChallenge"
        "401":
          description: Not signed in
        "404":
          description: Challenge not found or expired
  /student/challenges/{id}/submit:
    post:
      operationId: submitStudentChallenge
      tags: [student]
      summary: Submit or resubmit an answer for a challenge
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitChallengeBody"
      responses:
        "200":
          description: Submission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeSubmission"
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeSubmission"
        "400":
          description: Invalid submission
        "401":
          description: Not signed in
        "404":
          description: Challenge not found or expired
  /teacher/challenges:
    get:
      operationId: getTeacherChallenges
      tags: [teacher]
      summary: List all daily challenges for the teacher's classes
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Challenges list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherChallengeList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher
    post:
      operationId: createTeacherChallenge
      tags: [teacher]
      summary: Create a new daily challenge for a class
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChallengeBody"
      responses:
        "201":
          description: Created challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherChallenge"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Not a teacher
  /teacher/challenges/{id}:
    delete:
      operationId: deleteTeacherChallenge
      tags: [teacher]
      summary: Soft-delete a daily challenge
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "204":
          description: Challenge deleted
        "401":
          description: Not signed in
        "403":
          description: Not a teacher
        "404":
          description: Challenge not found
  /teacher/challenges/{id}/submissions:
    get:
      operationId: getTeacherChallengeSubmissions
      tags: [teacher]
      summary: List all submissions for a challenge
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Submissions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherSubmissionList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher
        "404":
          description: Challenge not found
  /teacher/submissions/{id}/review:
    post:
      operationId: reviewTeacherSubmission
      tags: [teacher]
      summary: Accept or reject a student submission
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSubmissionBody"
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewedSubmission"
        "400":
          description: Invalid body or already accepted
        "401":
          description: Not signed in
        "403":
          description: Not a teacher
        "404":
          description: Submission or challenge not found
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get the top students by points, plus the current student's own rank
      parameters:
        - in: query
          name: classId
          required: false
          schema:
            type: integer
          description: Filter leaderboard to a specific class. If omitted and the caller is a signed-in student, their class is used.
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"
  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List every platform user for admin management
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
  /admin/teachers:
    post:
      operationId: toggleAdminTeacher
      tags: [admin]
      summary: Promote or demote a user as teacher by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminToggleTeacherBody"
      responses:
        "200":
          description: Updated user role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
  /admin/classes:
    get:
      operationId: getAdminClasses
      tags: [admin]
      summary: List all classes with their teacher and students
      responses:
        "200":
          description: Classes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClassList"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
    post:
      operationId: createAdminClass
      tags: [admin]
      summary: Create a new class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "200":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClass"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
  /admin/classes/{id}:
    patch:
      operationId: updateAdminClass
      tags: [admin]
      summary: Update a class name or teacher assignment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassBody"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClass"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
    delete:
      operationId: deleteAdminClass
      tags: [admin]
      summary: Delete a class and detach its students
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Class deleted
        "401":
          description: Not signed in
        "403":
          description: Not an admin
        "404":
          description: Class not found
  /admin/students/{id}/class:
    patch:
      operationId: moveAdminStudentClass
      tags: [admin]
      summary: Move or remove a student from a class
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveStudentBody"
      responses:
        "200":
          description: Updated student class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStudentClass"
        "401":
          description: Not signed in
        "403":
          description: Not an admin
  /teacher/classes:
    get:
      operationId: getTeacherClasses
      tags: [teacher]
      summary: List the teacher's classes with their students
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Classes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherClassList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /teacher/unclaimed:
    get:
      operationId: getTeacherUnclaimed
      tags: [teacher]
      summary: List students who are not assigned to any class yet
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Unclaimed students list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnclaimedStudentList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /teacher/students/{id}/claim:
    post:
      operationId: claimTeacherStudent
      tags: [teacher]
      summary: Add an unclaimed student to one of the teacher's classes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimStudentBody"
      responses:
        "200":
          description: Student claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherStudent"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /teacher/students/{id}:
    patch:
      operationId: updateTeacherStudent
      tags: [teacher]
      summary: Update a student's name or points in the teacher's class
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherStudent"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /teacher/students/{id}/class:
    delete:
      operationId: removeTeacherStudentClass
      tags: [teacher]
      summary: Remove a student from the teacher's class
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Student removed from class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherStudentClass"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /games:
    get:
      operationId: getGames
      tags: [games]
      summary: List games accessible to the signed-in user
      responses:
        "200":
          description: Games list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameList"
        "401":
          description: Not signed in
  /games/{id}:
    get:
      operationId: getGameById
      tags: [games]
      summary: Get a single game with its words
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameDetail"
        "401":
          description: Not signed in
        "403":
          description: Game not accessible
        "404":
          description: Game not found
  /games/{id}/complete:
    post:
      operationId: completeGame
      tags: [games]
      summary: Submit a completed game session and award points
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteGameBody"
      responses:
        "201":
          description: Completion recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameCompletionResult"
        "400":
          description: Invalid body or already completed
        "401":
          description: Not signed in
        "403":
          description: Game not accessible
        "404":
          description: Game not found
  /teacher/games:
    get:
      operationId: getTeacherGames
      tags: [teacher]
      summary: List all games for teacher management
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Games list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherGameList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
    post:
      operationId: createTeacherGame
      tags: [teacher]
      summary: Create a new game placeholder
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameBody"
      responses:
        "201":
          description: Created game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherGame"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
  /teacher/games/{id}:
    put:
      operationId: updateTeacherGame
      tags: [teacher]
      summary: Update game metadata
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGameBody"
      responses:
        "200":
          description: Updated game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherGame"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
        "404":
          description: Game not found
  /teacher/games/{id}/words:
    get:
      operationId: getTeacherGameWords
      tags: [teacher]
      summary: Get the items for a game
      description: Admins can pass ?teacherId= to preview another teacher's dashboard. Kept at /words for API compatibility.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameItemsList"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
    put:
      operationId: updateTeacherGameWords
      tags: [teacher]
      summary: Replace items and bump the game version
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGameItemsBody"
      responses:
        "200":
          description: Updated items and version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameItemsList"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
        "404":
          description: Game not found
  /teacher/games/{id}/stats:
    get:
      operationId: getTeacherGameStats
      tags: [teacher]
      summary: Get statistics for a game
      description: Admins can pass ?teacherId= to preview another teacher's dashboard.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/TeacherIdQuery"
      responses:
        "200":
          description: Game statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherGameStats"
        "401":
          description: Not signed in
        "403":
          description: Not a teacher or admin
        "404":
          description: Game not found
  /chat/rooms:
    get:
      operationId: getChatRooms
      tags: [chat]
      summary: List available chat rooms
      responses:
        "200":
          description: Rooms list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomList"
        "401":
          description: Not signed in
  /chat/rooms/{classId}/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: List messages in a chat room
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
          description: "'general' or a class id"
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageList"
        "401":
          description: Not signed in
        "403":
          description: Cannot access this room
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to a chat room
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
          description: "'general' or a class id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Cannot access this room or muted
  /chat/messages/{id}:
    delete:
      operationId: deleteChatMessage
      tags: [chat]
      summary: Delete a chat message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Message deleted
        "401":
          description: Not signed in
        "403":
          description: Cannot delete this message
        "404":
          description: Message not found
  /chat/rooms/{classId}/mute:
    post:
      operationId: muteChatStudent
      tags: [chat]
      summary: Mute a student in a chat room
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
          description: "'general' or a class id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMuteBody"
      responses:
        "201":
          description: Student muted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMute"
        "400":
          description: Invalid body
        "401":
          description: Not signed in
        "403":
          description: Cannot moderate this room
        "404":
          description: Student not found
  /chat/rooms/{classId}/mute/{studentId}:
    delete:
      operationId: unmuteChatStudent
      tags: [chat]
      summary: Unmute a student in a chat room
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
          description: "'general' or a class id"
        - in: path
          name: studentId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Student unmuted
        "401":
          description: Not signed in
        "403":
          description: Cannot moderate this room
  /chat/rooms/{classId}/mutes:
    get:
      operationId: getChatMutes
      tags: [chat]
      summary: List muted students in a chat room
      parameters:
        - in: path
          name: classId
          required: true
          schema:
            type: string
          description: "'general' or a class id"
      responses:
        "200":
          description: Mutes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMuteList"
        "401":
          description: Not signed in
        "403":
          description: Cannot moderate this room
components:
  parameters:
    TeacherIdQuery:
      in: query
      name: teacherId
      required: false
      schema:
        type: integer
      description: Optional teacher id (admin-only) to preview another teacher's dashboard.
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Identity:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [student, teacher]
        isAdmin:
          type: boolean
        isTeacher:
          type: boolean
        nameConfirmed:
          type: boolean
        points:
