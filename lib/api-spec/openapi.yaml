openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: student
    description: Student profile operations
  - name: leaderboard
    description: Leaderboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /student/me:
    get:
      operationId: getStudentProfile
      tags: [student]
      summary: Get the signed-in student's profile
      description: Returns the current student's profile, creating one on first visit (JIT-provisioned from the Clerk account).
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "401":
          description: Not signed in
  /student/avatar:
    patch:
      operationId: updateStudentAvatar
      tags: [student]
      summary: Update the signed-in student's avatar customization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarConfig"
      responses:
        "200":
          description: Updated student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "401":
          description: Not signed in
  /student/daily-challenge:
    get:
      operationId: getDailyChallenge
      tags: [student]
      summary: Get today's daily challenge and the student's completion status
      responses:
        "200":
          description: Today's challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChallenge"
        "401":
          description: Not signed in
  /student/daily-challenge/complete:
    post:
      operationId: completeDailyChallenge
      tags: [student]
      summary: Mark today's daily challenge as completed and award points
      description: Idempotent — completing an already-completed challenge awards no additional points.
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChallengeCompletion"
        "401":
          description: Not signed in
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get the top students by points, plus the current student's own rank
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AvatarConfig:
      type: object
      properties:
        bgColor:
          type: string
        accessories:
          type: array
          items:
            type: string
        gender:
          type: string
          enum: [male, female]
        pet:
          type: string
      required:
        - bgColor
        - accessories
        - gender
        - pet
    StudentProfile:
      type: object
      properties:
        name:
          type: string
        points:
          type: integer
        avatarConfig:
          $ref: "#/components/schemas/AvatarConfig"
      required:
        - name
        - points
        - avatarConfig
    DailyChallenge:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        pointsReward:
          type: integer
        completed:
          type: boolean
      required:
        - title
        - description
        - pointsReward
        - completed
    DailyChallengeCompletion:
      type: object
      properties:
        alreadyCompleted:
          type: boolean
        pointsAwarded:
          type: integer
        totalPoints:
          type: integer
      required:
        - alreadyCompleted
        - pointsAwarded
        - totalPoints
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        name:
          type: string
        points:
          type: integer
        avatarConfig:
          $ref: "#/components/schemas/AvatarConfig"
        isMe:
          type: boolean
      required:
        - rank
        - name
        - points
        - avatarConfig
        - isMe
    Leaderboard:
      type: object
      properties:
        top:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        me:
          oneOf:
            - $ref: "#/components/schemas/LeaderboardEntry"
            - type: "null"
      required:
        - top
        - me

