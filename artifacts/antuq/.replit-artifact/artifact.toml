kind = "web"
previewPath = "/"
title = "انطق"
version = "1.0.0"
id = "artifacts/antuq"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23632

[services.development]
run = "pnpm --filter @workspace/antuq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/antuq", "run", "build" ]
serve = "static"
publicDir = "artifacts/antuq/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23632"
BASE_PATH = "/"
